services:

  workspace:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    environment:
      DATABASE_URL: postgresql://attendance_user:attendance_pass@db:5432/attendance_dev
      SECRET_KEY: dev-secret-key-change-in-prod
      DEBUG: "true"
      CORS_ORIGINS: '["http://localhost:5173"]'
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: attendance_user
      POSTGRES_PASSWORD: attendance_pass
      POSTGRES_DB: attendance_dev
    volumes:
      - postgres_devcontainer_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U attendance_user -d attendance_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_devcontainer_data:
